name: Release recipes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
  push:
    tags:
      - "v*"

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build release assets
        run: |
          node scripts/build-release.ts --tag "${{ github.ref_name }}"

      - name: Sign recipes index
        env:
          RECIPES_INDEX_SIGNING_PRIVATE_KEY: ${{ secrets.RECIPES_INDEX_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$RECIPES_INDEX_SIGNING_PRIVATE_KEY" ]; then
            echo "RECIPES_INDEX_SIGNING_PRIVATE_KEY is required" >&2
            exit 1
          fi
          key_path="$RUNNER_TEMP/recipes-index-signing-key.pem"
          trap 'rm -f "$key_path"' EXIT
          umask 077
          printf '%s\n' "$RECIPES_INDEX_SIGNING_PRIVATE_KEY" > "$key_path"
          node scripts/sign-index.ts --key "$key_path" --key-id 2026-05
          cp index.json.sig dist/index.json.sig

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/index.json
            dist/index.json.sig
